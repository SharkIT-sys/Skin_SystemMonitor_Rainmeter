; ============================================================
; System Monitor v2.4 - Rainmeter Skin
; ============================================================
[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
Draggable=1

[Metadata]
Name=System Monitor
Author=Javi
Version=2.4

@Include=#@#Variables.inc

[Variables]
NvGPU=0
IntelGPU=0

; ============================================================
; MEASURES
; ============================================================

[MeasureTrigger]
Measure=Calc
Formula=1
UpdateDivider=2
OnUpdateAction=[!CommandMeasure MeasureGPUNvidiaCMD "Run"][!CommandMeasure MeasureGPUIntelCMD "Run"]

; --- TRIGGER PARA EL TIEMPO (CADA 30 MIN) ---
[MeasureTriggerWeather]
Measure=Calc
Formula=1
UpdateDivider=1800
OnUpdateAction=[!CommandMeasure MeasureWeatherScript "Run"]

; --- CPU ---
[MeasureCPU]
Measure=CPU
IfCondition=MeasureCPU >= 90
IfTrueAction=[!SetOption MeterCPUBar BarColor "#CriticalColor#"][!SetOption MeterCPUValue FontColor "#CriticalColor#"][!UpdateMeter MeterCPUBar][!UpdateMeter MeterCPUValue][!Redraw]
IfCondition2=(MeasureCPU >= 75) && (MeasureCPU < 90)
IfTrueAction2=[!SetOption MeterCPUBar BarColor "#WarningColor#"][!SetOption MeterCPUValue FontColor "#WarningColor#"][!UpdateMeter MeterCPUBar][!UpdateMeter MeterCPUValue][!Redraw]
IfCondition3=MeasureCPU < 75
IfTrueAction3=[!SetOption MeterCPUBar BarColor "#BarColor#"][!SetOption MeterCPUValue FontColor "#AccentColor#"][!UpdateMeter MeterCPUBar][!UpdateMeter MeterCPUValue][!Redraw]

; --- GPU NVIDIA via nvidia-smi ---
[MeasureGPUNvidiaCMD]
Measure=Plugin
Plugin=RunCommand
Program=nvidia-smi.exe
Parameter=--query-gpu=utilization.gpu --format=csv,noheader,nounits
State=Hide
OutputType=ANSI
RegExpSubstitute=1
Substitute="[\s\r\n]":""
FinishAction=[!SetVariable NvGPU "[MeasureGPUNvidiaCMD]"][!UpdateMeasure MeasureGPUNvidia]

[MeasureGPUNvidia]
Measure=Calc
Formula=Max(Min(#NvGPU#,100),0)
MaxValue=100
MinValue=0
DynamicVariables=1
IfCondition=MeasureGPUNvidia >= 90
IfTrueAction=[!SetOption MeterGPUNvidiaBar BarColor "#CriticalColor#"][!SetOption MeterGPUNvidiaValue FontColor "#CriticalColor#"][!UpdateMeter MeterGPUNvidiaBar][!UpdateMeter MeterGPUNvidiaValue][!Redraw]
IfCondition2=(MeasureGPUNvidia >= 75) && (MeasureGPUNvidia < 90)
IfTrueAction2=[!SetOption MeterGPUNvidiaBar BarColor "#WarningColor#"][!SetOption MeterGPUNvidiaValue FontColor "#WarningColor#"][!UpdateMeter MeterGPUNvidiaBar][!UpdateMeter MeterGPUNvidiaValue][!Redraw]
IfCondition3=MeasureGPUNvidia < 75
IfTrueAction3=[!SetOption MeterGPUNvidiaBar BarColor "#BarColor#"][!SetOption MeterGPUNvidiaValue FontColor "#AccentColor#"][!UpdateMeter MeterGPUNvidiaBar][!UpdateMeter MeterGPUNvidiaValue][!Redraw]

; --- GPU Intel via script PowerShell ---
[MeasureGPUIntelCMD]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoProfile -NonInteractive -ExecutionPolicy Bypass -File "#CURRENTPATH#GetIntelGPU.ps1"
State=Hide
OutputType=ANSI
RegExpSubstitute=1
Substitute="[\s\r\n]":""
FinishAction=[!SetVariable IntelGPU "[MeasureGPUIntelCMD]"][!UpdateMeasure MeasureGPUIntel]

[MeasureGPUIntel]
Measure=Calc
Formula=Max(Min(#IntelGPU#,100),0)
MaxValue=100
MinValue=0
DynamicVariables=1
IfCondition=MeasureGPUIntel >= 90
IfTrueAction=[!SetOption MeterGPUIntelBar BarColor "#CriticalColor#"][!SetOption MeterGPUIntelValue FontColor "#CriticalColor#"][!UpdateMeter MeterGPUIntelBar][!UpdateMeter MeterGPUIntelValue][!Redraw]
IfCondition2=(MeasureGPUIntel >= 75) && (MeasureGPUIntel < 90)
IfTrueAction2=[!SetOption MeterGPUIntelBar BarColor "#WarningColor#"][!SetOption MeterGPUIntelValue FontColor "#WarningColor#"][!UpdateMeter MeterGPUIntelBar][!UpdateMeter MeterGPUIntelValue][!Redraw]
IfCondition3=MeasureGPUIntel < 75
IfTrueAction3=[!SetOption MeterGPUIntelBar BarColor "#BarColor#"][!SetOption MeterGPUIntelValue FontColor "#AccentColor#"][!UpdateMeter MeterGPUIntelBar][!UpdateMeter MeterGPUIntelValue][!Redraw]

; --- RAM ---
[MeasureRAMUsed]
Measure=PhysicalMemory
UpdateDivider=5

[MeasureRAMTotal]
Measure=PhysicalMemory
Total=1
UpdateDivider=60

[MeasureRAMPercent]
Measure=Calc
Formula=(MeasureRAMUsed / MeasureRAMTotal) * 100
MaxValue=100
MinValue=0
IfCondition=MeasureRAMPercent >= 90
IfTrueAction=[!SetOption MeterRAMBar BarColor "#CriticalColor#"][!SetOption MeterRAMValue FontColor "#CriticalColor#"][!UpdateMeter MeterRAMBar][!UpdateMeter MeterRAMValue][!Redraw]
IfCondition2=(MeasureRAMPercent >= 75) && (MeasureRAMPercent < 90)
IfTrueAction2=[!SetOption MeterRAMBar BarColor "#WarningColor#"][!SetOption MeterRAMValue FontColor "#WarningColor#"][!UpdateMeter MeterRAMBar][!UpdateMeter MeterRAMValue][!Redraw]
IfCondition3=MeasureRAMPercent < 75
IfTrueAction3=[!SetOption MeterRAMBar BarColor "#BarColor#"][!SetOption MeterRAMValue FontColor "#AccentColor#"][!UpdateMeter MeterRAMBar][!UpdateMeter MeterRAMValue][!Redraw]

[MeasureRAMUsedGB]
Measure=Calc
Formula=(MeasureRAMUsed / 1073741824)

[MeasureRAMTotalGB]
Measure=Calc
Formula=(MeasureRAMTotal / 1073741824)

; --- Disk C ---
[MeasureDiskCFree]
Measure=FreeDiskSpace
Drive=C:
UpdateDivider=30

[MeasureDiskCTotal]
Measure=FreeDiskSpace
Drive=C:
Total=1
UpdateDivider=60

[MeasureDiskCPercent]
Measure=Calc
Formula=100 - ((MeasureDiskCFree / MeasureDiskCTotal) * 100)
MaxValue=100
MinValue=0
IfCondition=MeasureDiskCPercent >= 90
IfTrueAction=[!SetOption MeterDiskCBar BarColor "#CriticalColor#"][!SetOption MeterDiskCValue FontColor "#CriticalColor#"][!UpdateMeter MeterDiskCBar][!UpdateMeter MeterDiskCValue][!Redraw]
IfCondition2=(MeasureDiskCPercent >= 75) && (MeasureDiskCPercent < 90)
IfTrueAction2=[!SetOption MeterDiskCBar BarColor "#WarningColor#"][!SetOption MeterDiskCValue FontColor "#WarningColor#"][!UpdateMeter MeterDiskCBar][!UpdateMeter MeterDiskCValue][!Redraw]
IfCondition3=MeasureDiskCPercent < 75
IfTrueAction3=[!SetOption MeterDiskCBar BarColor "#BarColor#"][!SetOption MeterDiskCValue FontColor "#AccentColor#"][!UpdateMeter MeterDiskCBar][!UpdateMeter MeterDiskCValue][!Redraw]

; --- Disk D ---
[MeasureDiskDFree]
Measure=FreeDiskSpace
Drive=D:
UpdateDivider=30

[MeasureDiskDTotal]
Measure=FreeDiskSpace
Drive=D:
Total=1
UpdateDivider=60

[MeasureDiskDPercent]
Measure=Calc
Formula=100 - ((MeasureDiskDFree / MeasureDiskDTotal) * 100)
MaxValue=100
MinValue=0
IfCondition=MeasureDiskDPercent >= 90
IfTrueAction=[!SetOption MeterDiskDBar BarColor "#CriticalColor#"][!SetOption MeterDiskDValue FontColor "#CriticalColor#"][!UpdateMeter MeterDiskDBar][!UpdateMeter MeterDiskDValue][!Redraw]
IfCondition2=(MeasureDiskDPercent >= 75) && (MeasureDiskDPercent < 90)
IfTrueAction2=[!SetOption MeterDiskDBar BarColor "#WarningColor#"][!SetOption MeterDiskDValue FontColor "#WarningColor#"][!UpdateMeter MeterDiskDBar][!UpdateMeter MeterDiskDValue][!Redraw]
IfCondition3=MeasureDiskDPercent < 75
IfTrueAction3=[!SetOption MeterDiskDBar BarColor "#BarColor#"][!SetOption MeterDiskDValue FontColor "#AccentColor#"][!UpdateMeter MeterDiskDBar][!UpdateMeter MeterDiskDValue][!Redraw]

; --- Disk E (Dynamic) ---
[MeasureDiskEFree]
Measure=FreeDiskSpace
Drive=E:
IgnoreRemovable=0
UpdateDivider=5

[MeasureDiskETotal]
Measure=FreeDiskSpace
Drive=E:
Total=1
IgnoreRemovable=0
UpdateDivider=5
IfCondition=MeasureDiskETotal < 1
IfTrueAction=[!HideMeterGroup DiskE][!SetOption MeterDiskELabel Y "0R"][!SetOption MeterDiskEBar Y "0R"][!UpdateMeter *][!Redraw]
IfCondition2=MeasureDiskETotal > 0
IfTrueAction2=[!ShowMeterGroup DiskE][!SetOption MeterDiskELabel Y "10R"][!SetOption MeterDiskEBar Y "2R"][!UpdateMeter *][!Redraw]

[MeasureDiskEPercent]
Measure=Calc
Formula=(MeasureDiskETotal = 0 ? 0 : (100 - ((MeasureDiskEFree / MeasureDiskETotal) * 100)))
MaxValue=100
MinValue=0
IfCondition=(MeasureDiskEPercent >= 90) && (MeasureDiskETotal > 0)
IfTrueAction=[!SetOption MeterDiskEBar BarColor "#CriticalColor#"][!SetOption MeterDiskEValue FontColor "#CriticalColor#"][!UpdateMeter MeterDiskEBar][!UpdateMeter MeterDiskEValue][!Redraw]
IfCondition2=(MeasureDiskEPercent >= 75) && (MeasureDiskEPercent < 90) && (MeasureDiskETotal > 0)
IfTrueAction2=[!SetOption MeterDiskEBar BarColor "#WarningColor#"][!SetOption MeterDiskEValue FontColor "#WarningColor#"][!UpdateMeter MeterDiskEBar][!UpdateMeter MeterDiskEValue][!Redraw]
IfCondition3=(MeasureDiskEPercent < 75) && (MeasureDiskETotal > 0)
IfTrueAction3=[!SetOption MeterDiskEBar BarColor "#BarColor#"][!SetOption MeterDiskEValue FontColor "#AccentColor#"][!UpdateMeter MeterDiskEBar][!UpdateMeter MeterDiskEValue][!Redraw]

; --- Disk F (Dynamic) ---
[MeasureDiskFFree]
Measure=FreeDiskSpace
Drive=F:
IgnoreRemovable=0
UpdateDivider=5

[MeasureDiskFTotal]
Measure=FreeDiskSpace
Drive=F:
Total=1
IgnoreRemovable=0
UpdateDivider=5
IfCondition=MeasureDiskFTotal < 1
IfTrueAction=[!HideMeterGroup DiskF][!SetOption MeterDiskFLabel Y "0R"][!SetOption MeterDiskFBar Y "0R"][!UpdateMeter *][!Redraw]
IfCondition2=MeasureDiskFTotal > 0
IfTrueAction2=[!ShowMeterGroup DiskF][!SetOption MeterDiskFLabel Y "10R"][!SetOption MeterDiskFBar Y "2R"][!UpdateMeter *][!Redraw]

[MeasureDiskFPercent]
Measure=Calc
Formula=(MeasureDiskFTotal = 0 ? 0 : (100 - ((MeasureDiskFFree / MeasureDiskFTotal) * 100)))
MaxValue=100
MinValue=0
IfCondition=(MeasureDiskFPercent >= 90) && (MeasureDiskFTotal > 0)
IfTrueAction=[!SetOption MeterDiskFBar BarColor "#CriticalColor#"][!SetOption MeterDiskFValue FontColor "#CriticalColor#"][!UpdateMeter MeterDiskFBar][!UpdateMeter MeterDiskFValue][!Redraw]
IfCondition2=(MeasureDiskFPercent >= 75) && (MeasureDiskFPercent < 90) && (MeasureDiskFTotal > 0)
IfTrueAction2=[!SetOption MeterDiskFBar BarColor "#WarningColor#"][!SetOption MeterDiskFValue FontColor "#WarningColor#"][!UpdateMeter MeterDiskFBar][!UpdateMeter MeterDiskFValue][!Redraw]
IfCondition3=(MeasureDiskFPercent < 75) && (MeasureDiskFTotal > 0)
IfTrueAction3=[!SetOption MeterDiskFBar BarColor "#BarColor#"][!SetOption MeterDiskFValue FontColor "#AccentColor#"][!UpdateMeter MeterDiskFBar][!UpdateMeter MeterDiskFValue][!Redraw]

; --- Disk G (Dynamic) ---
[MeasureDiskGFree]
Measure=FreeDiskSpace
Drive=G:
IgnoreRemovable=0
UpdateDivider=5

[MeasureDiskGTotal]
Measure=FreeDiskSpace
Drive=G:
Total=1
IgnoreRemovable=0
UpdateDivider=5
IfCondition=MeasureDiskGTotal < 1
IfTrueAction=[!HideMeterGroup DiskG][!SetOption MeterDiskGLabel Y "0R"][!SetOption MeterDiskGBar Y "0R"][!UpdateMeter *][!Redraw]
IfCondition2=MeasureDiskGTotal > 0
IfTrueAction2=[!ShowMeterGroup DiskG][!SetOption MeterDiskGLabel Y "10R"][!SetOption MeterDiskGBar Y "2R"][!UpdateMeter *][!Redraw]

[MeasureDiskGPercent]
Measure=Calc
Formula=(MeasureDiskGTotal = 0 ? 0 : (100 - ((MeasureDiskGFree / MeasureDiskGTotal) * 100)))
MaxValue=100
MinValue=0
IfCondition=(MeasureDiskGPercent >= 90) && (MeasureDiskGTotal > 0)
IfTrueAction=[!SetOption MeterDiskGBar BarColor "#CriticalColor#"][!SetOption MeterDiskGValue FontColor "#CriticalColor#"][!UpdateMeter MeterDiskGBar][!UpdateMeter MeterDiskGValue][!Redraw]
IfCondition2=(MeasureDiskGPercent >= 75) && (MeasureDiskGPercent < 90) && (MeasureDiskGTotal > 0)
IfTrueAction2=[!SetOption MeterDiskGBar BarColor "#WarningColor#"][!SetOption MeterDiskGValue FontColor "#WarningColor#"][!UpdateMeter MeterDiskGBar][!UpdateMeter MeterDiskGValue][!Redraw]
IfCondition3=(MeasureDiskGPercent < 75) && (MeasureDiskGTotal > 0)
IfTrueAction3=[!SetOption MeterDiskGBar BarColor "#BarColor#"][!SetOption MeterDiskGValue FontColor "#AccentColor#"][!UpdateMeter MeterDiskGBar][!UpdateMeter MeterDiskGValue][!Redraw]

; --- Network ---
[MeasureNetIn]
Measure=NetIn

[MeasureNetInKB]
Measure=Calc
Formula=(MeasureNetIn / 1024)
MaxValue=10240

[MeasureNetOut]
Measure=NetOut

[MeasureNetOutKB]
Measure=Calc
Formula=(MeasureNetOut / 1024)
MaxValue=1024

; --- Tiempo (PowerShell Script) ---
[MeasureWeatherScript]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoProfile -NonInteractive -ExecutionPolicy Bypass -File "#CURRENTPATH#@Resources\GetWeather.ps1"
State=Hide
FinishAction=[!CommandMeasure MeasureWeather "Update"]

; --- Tiempo (WebParser File Reader) ---
[MeasureWeather]
Measure=WebParser
Url=file://#CURRENTPATH#@Resources\Weather.txt
RegExp=(?siU)^(.*)\n(.*)\n(.*)\n(.*)\n(.*)\n(.*)\n(.*)\n(.*)\n(.*)\n(.*)$
UpdateRate=-1
CodePage=1200

[MeasureWAhora]
Measure=WebParser
Url=[MeasureWeather]
StringIndex=1

[MeasureW8h]
Measure=WebParser
Url=[MeasureWeather]
StringIndex=2

[MeasureW24h]
Measure=WebParser
Url=[MeasureWeather]
StringIndex=3

[MeasureW48h]
Measure=WebParser
Url=[MeasureWeather]
StringIndex=4

[MeasureW72h]
Measure=WebParser
Url=[MeasureWeather]
StringIndex=5

[MeasureMoon0]
Measure=WebParser
Url=[MeasureWeather]
StringIndex=6

[MeasureMoon1]
Measure=WebParser
Url=[MeasureWeather]
StringIndex=7

[MeasureMoon2]
Measure=WebParser
Url=[MeasureWeather]
StringIndex=8

[MeasureMoon3]
Measure=WebParser
Url=[MeasureWeather]
StringIndex=9

[MeasureMoon4]
Measure=WebParser
Url=[MeasureWeather]
StringIndex=10


; ============================================================
; System Monitor v2.4 - Rainmeter Skin
; ============================================================
[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
Draggable=1

[Metadata]
Name=System Monitor
Author=Javi
Version=2.4

@Include=#@#Variables.inc

[Variables]
NvGPU=0
IntelGPU=0

; ============================================================
; MEASURES
; ============================================================

; --- TRIGGER PARA RUNCOMMAND ---
; RunCommand no se ejecuta solo, necesita un trigger. Esto lo ejecuta cada 2 segundos.
[MeasureTrigger]
Measure=Calc
Formula=1
UpdateDivider=2
OnUpdateAction=[!CommandMeasure MeasureGPUNvidiaCMD "Run"][!CommandMeasure MeasureGPUIntelCMD "Run"]

; --- CPU ---
[MeasureCPU]
Measure=CPU
IfCondition=MeasureCPU >= 90
IfTrueAction=[!SetOption MeterCPUBar BarColor "#CriticalColor#"][!SetOption MeterCPUValue FontColor "#CriticalColor#"][!UpdateMeter MeterCPUBar][!UpdateMeter MeterCPUValue][!Redraw]
IfCondition2=(MeasureCPU >= 75) && (MeasureCPU < 90)
IfTrueAction2=[!SetOption MeterCPUBar BarColor "#WarningColor#"][!SetOption MeterCPUValue FontColor "#WarningColor#"][!UpdateMeter MeterCPUBar][!UpdateMeter MeterCPUValue][!Redraw]
IfCondition3=MeasureCPU < 75
IfTrueAction3=[!SetOption MeterCPUBar BarColor "#BarColor#"][!SetOption MeterCPUValue FontColor "#AccentColor#"][!UpdateMeter MeterCPUBar][!UpdateMeter MeterCPUValue][!Redraw]

; --- GPU NVIDIA via nvidia-smi ---
[MeasureGPUNvidiaCMD]
Measure=Plugin
Plugin=RunCommand
Program=nvidia-smi.exe
Parameter=--query-gpu=utilization.gpu --format=csv,noheader,nounits
State=Hide
OutputType=ANSI
RegExpSubstitute=1
Substitute="[\s\r\n]":""
FinishAction=[!SetVariable NvGPU "[MeasureGPUNvidiaCMD]"][!UpdateMeasure MeasureGPUNvidia]

[MeasureGPUNvidia]
Measure=Calc
Formula=Max(Min(#NvGPU#,100),0)
MaxValue=100
MinValue=0
DynamicVariables=1
IfCondition=MeasureGPUNvidia >= 90
IfTrueAction=[!SetOption MeterGPUNvidiaBar BarColor "#CriticalColor#"][!SetOption MeterGPUNvidiaValue FontColor "#CriticalColor#"][!UpdateMeter MeterGPUNvidiaBar][!UpdateMeter MeterGPUNvidiaValue][!Redraw]
IfCondition2=(MeasureGPUNvidia >= 75) && (MeasureGPUNvidia < 90)
IfTrueAction2=[!SetOption MeterGPUNvidiaBar BarColor "#WarningColor#"][!SetOption MeterGPUNvidiaValue FontColor "#WarningColor#"][!UpdateMeter MeterGPUNvidiaBar][!UpdateMeter MeterGPUNvidiaValue][!Redraw]
IfCondition3=MeasureGPUNvidia < 75
IfTrueAction3=[!SetOption MeterGPUNvidiaBar BarColor "#BarColor#"][!SetOption MeterGPUNvidiaValue FontColor "#AccentColor#"][!UpdateMeter MeterGPUNvidiaBar][!UpdateMeter MeterGPUNvidiaValue][!Redraw]

; --- GPU Intel via script PowerShell ---
[MeasureGPUIntelCMD]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoProfile -NonInteractive -ExecutionPolicy Bypass -File "#CURRENTPATH#GetIntelGPU.ps1"
State=Hide
OutputType=ANSI
RegExpSubstitute=1
Substitute="[\s\r\n]":""
FinishAction=[!SetVariable IntelGPU "[MeasureGPUIntelCMD]"][!UpdateMeasure MeasureGPUIntel]

[MeasureGPUIntel]
Measure=Calc
Formula=Max(Min(#IntelGPU#,100),0)
MaxValue=100
MinValue=0
DynamicVariables=1
IfCondition=MeasureGPUIntel >= 90
IfTrueAction=[!SetOption MeterGPUIntelBar BarColor "#CriticalColor#"][!SetOption MeterGPUIntelValue FontColor "#CriticalColor#"][!UpdateMeter MeterGPUIntelBar][!UpdateMeter MeterGPUIntelValue][!Redraw]
IfCondition2=(MeasureGPUIntel >= 75) && (MeasureGPUIntel < 90)
IfTrueAction2=[!SetOption MeterGPUIntelBar BarColor "#WarningColor#"][!SetOption MeterGPUIntelValue FontColor "#WarningColor#"][!UpdateMeter MeterGPUIntelBar][!UpdateMeter MeterGPUIntelValue][!Redraw]
IfCondition3=MeasureGPUIntel < 75
IfTrueAction3=[!SetOption MeterGPUIntelBar BarColor "#BarColor#"][!SetOption MeterGPUIntelValue FontColor "#AccentColor#"][!UpdateMeter MeterGPUIntelBar][!UpdateMeter MeterGPUIntelValue][!Redraw]

; --- RAM ---
[MeasureRAMUsed]
Measure=PhysicalMemory
UpdateDivider=5

[MeasureRAMTotal]
Measure=PhysicalMemory
Total=1
UpdateDivider=60

[MeasureRAMPercent]
Measure=Calc
Formula=(MeasureRAMUsed / MeasureRAMTotal) * 100
MaxValue=100
MinValue=0
IfCondition=MeasureRAMPercent >= 90
IfTrueAction=[!SetOption MeterRAMBar BarColor "#CriticalColor#"][!SetOption MeterRAMValue FontColor "#CriticalColor#"][!UpdateMeter MeterRAMBar][!UpdateMeter MeterRAMValue][!Redraw]
IfCondition2=(MeasureRAMPercent >= 75) && (MeasureRAMPercent < 90)
IfTrueAction2=[!SetOption MeterRAMBar BarColor "#WarningColor#"][!SetOption MeterRAMValue FontColor "#WarningColor#"][!UpdateMeter MeterRAMBar][!UpdateMeter MeterRAMValue][!Redraw]
IfCondition3=MeasureRAMPercent < 75
IfTrueAction3=[!SetOption MeterRAMBar BarColor "#BarColor#"][!SetOption MeterRAMValue FontColor "#AccentColor#"][!UpdateMeter MeterRAMBar][!UpdateMeter MeterRAMValue][!Redraw]

[MeasureRAMUsedGB]
Measure=Calc
Formula=(MeasureRAMUsed / 1073741824)

[MeasureRAMTotalGB]
Measure=Calc
Formula=(MeasureRAMTotal / 1073741824)

; --- Disk C ---
[MeasureDiskCFree]
Measure=FreeDiskSpace
Drive=C:
UpdateDivider=30

[MeasureDiskCTotal]
Measure=FreeDiskSpace
Drive=C:
Total=1
UpdateDivider=60

[MeasureDiskCPercent]
Measure=Calc
Formula=100 - ((MeasureDiskCFree / MeasureDiskCTotal) * 100)
MaxValue=100
MinValue=0
IfCondition=MeasureDiskCPercent >= 90
IfTrueAction=[!SetOption MeterDiskCBar BarColor "#CriticalColor#"][!SetOption MeterDiskCValue FontColor "#CriticalColor#"][!UpdateMeter MeterDiskCBar][!UpdateMeter MeterDiskCValue][!Redraw]
IfCondition2=(MeasureDiskCPercent >= 75) && (MeasureDiskCPercent < 90)
IfTrueAction2=[!SetOption MeterDiskCBar BarColor "#WarningColor#"][!SetOption MeterDiskCValue FontColor "#WarningColor#"][!UpdateMeter MeterDiskCBar][!UpdateMeter MeterDiskCValue][!Redraw]
IfCondition3=MeasureDiskCPercent < 75
IfTrueAction3=[!SetOption MeterDiskCBar BarColor "#BarColor#"][!SetOption MeterDiskCValue FontColor "#AccentColor#"][!UpdateMeter MeterDiskCBar][!UpdateMeter MeterDiskCValue][!Redraw]

; --- Disk D ---
[MeasureDiskDFree]
Measure=FreeDiskSpace
Drive=D:
UpdateDivider=30

[MeasureDiskDTotal]
Measure=FreeDiskSpace
Drive=D:
Total=1
UpdateDivider=60

[MeasureDiskDPercent]
Measure=Calc
Formula=100 - ((MeasureDiskDFree / MeasureDiskDTotal) * 100)
MaxValue=100
MinValue=0
IfCondition=MeasureDiskDPercent >= 90
IfTrueAction=[!SetOption MeterDiskDBar BarColor "#CriticalColor#"][!SetOption MeterDiskDValue FontColor "#CriticalColor#"][!UpdateMeter MeterDiskDBar][!UpdateMeter MeterDiskDValue][!Redraw]
IfCondition2=(MeasureDiskDPercent >= 75) && (MeasureDiskDPercent < 90)
IfTrueAction2=[!SetOption MeterDiskDBar BarColor "#WarningColor#"][!SetOption MeterDiskDValue FontColor "#WarningColor#"][!UpdateMeter MeterDiskDBar][!UpdateMeter MeterDiskDValue][!Redraw]
IfCondition3=MeasureDiskDPercent < 75
IfTrueAction3=[!SetOption MeterDiskDBar BarColor "#BarColor#"][!SetOption MeterDiskDValue FontColor "#AccentColor#"][!UpdateMeter MeterDiskDBar][!UpdateMeter MeterDiskDValue][!Redraw]

; --- Network ---
[MeasureNetIn]
Measure=NetIn

[MeasureNetInKB]
Measure=Calc
Formula=(MeasureNetIn / 1024)
MaxValue=10240

[MeasureNetOut]
Measure=NetOut

[MeasureNetOutKB]
Measure=Calc
Formula=(MeasureNetOut / 1024)
MaxValue=1024

